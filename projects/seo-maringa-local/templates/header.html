<script>
  /* Menu mobile — JavaScript minimalista */
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var nav    = document.getElementById('nav-principal');

    if (!toggle || !nav) return;

    toggle.addEventListener('click', function () {
      var isOpen = nav.classList.toggle('nav--aberto');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      toggle.setAttribute('aria-label', isOpen ? 'Fechar menu de navegação' : 'Abrir menu de navegação');
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    /* Fechar ao clicar em link do menu */
    nav.querySelectorAll('.nav__link').forEach(function (link) {
      link.addEventListener('click', function () {
        nav.classList.remove('nav--aberto');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Abrir menu de navegação');
        document.body.style.overflow = '';
      });
    });

    /* Marcar link ativo conforme URL atual */
    var currentPath = window.location.pathname;
    nav.querySelectorAll('.nav__link').forEach(function (link) {
      var href = link.getAttribute('href');
      if (href === currentPath || (href !== '/' && currentPath.startsWith(href.replace('.html', '')))) {
        link.classList.add('nav__link--ativo');
        link.setAttribute('aria-current', 'page');
      }
    });
  })();
</script>
